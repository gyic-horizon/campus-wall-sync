version: '3.8'

services:
  campus-wall-sync:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: campus-wall-sync
    restart: unless-stopped
    
    environment:
      - CONFIG_PATH=/app/config.json
      - PYTHONUNBUFFERED=1
    
    ports:
      - "5000:5000"
    
    volumes:
      - ./config.json:/app/config.json:ro
      - campus-wall-data:/app/data
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  campus-wall-data:
    name: campus-wall-data

networks:
  default:
    name: campus-network
