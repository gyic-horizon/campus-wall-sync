name: Deploy to Server

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Run tests
        run: |
          pytest tests/ -v

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/campus-wall-sync
            
            # 1. 拉取最新代码
            git pull origin main
            
            # 2. 停止旧容器
            docker-compose down
            
            # 3. 本地构建镜像（服务器名作为镜像名）
            docker build -t campus-wall-sync:latest .
            
            # 4. 启动新容器
            docker-compose up -d
            
            # 5. 清理悬空镜像
            docker image prune -f
            
            # 6. 查看日志确认启动
            docker-compose logs --tail=30